<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a1628"/>
<title>HR Visión · Jornadas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1628;--bg2:#111e35;--bg3:#172540;
  --blue:#3b82f6;--blue2:#60a5fa;--blue3:rgba(59,130,246,0.15);
  --green:#22c55e;--green2:rgba(34,197,94,0.15);
  --amber:#f59e0b;--amber2:rgba(245,158,11,0.15);
  --red:#ef4444;--red2:rgba(239,68,68,0.15);
  --white:#f0f6ff;--gray:#64748b;--gray2:#94a3b8;--gray3:#cbd5e1;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --r:16px;--r2:12px;
  --font:'Plus Jakarta Sans',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--white)}
#app{height:100%;display:flex;flex-direction:column}
.screen{display:flex;flex-direction:column;height:100%}
.topbar{padding:calc(var(--safe-t) + 12px) 20px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.topbar-sub{font-size:11px;color:var(--gray2);margin-top:1px}
.topbar-badge{background:var(--blue3);border:1px solid rgba(59,130,246,.3);color:var(--blue2);font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.bottomnav{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:var(--safe-b);flex-shrink:0}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;color:var(--gray);font-size:10px;font-weight:600;font-family:var(--font);cursor:pointer;letter-spacing:.02em;text-transform:uppercase}
.bn.on{color:var(--blue2)}
.bn svg{width:22px;height:22px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 4px}
.stat-pill{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden}
.stat-pill::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px}
.sp-b::before{background:var(--blue)}.sp-g::before{background:var(--green)}.sp-r::before{background:var(--red)}.sp-a::before{background:var(--amber)}
.sp-l{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray2);font-weight:600}
.sp-v{font-size:18px;font-weight:800;margin-top:4px;line-height:1.1;word-break:break-word}
.sp-s{font-size:10px;color:var(--gray);margin-top:2px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:10px 16px 0}
.ch{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.ch-t{font-size:13px;font-weight:700;color:var(--gray3)}
.ch-a{background:none;border:none;color:var(--blue2);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer}
.pi{padding:13px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);cursor:pointer}
.pi:last-child{border-bottom:none}
.pi:active{background:rgba(255,255,255,.04)}
.av{width:42px;height:42px;border-radius:12px;background:var(--blue3);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--blue2);flex-shrink:0}
.av-r{background:var(--red2)!important;color:var(--red)!important}
.pi-info{flex:1;min-width:0}
.pi-n{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-s{font-size:11.5px;color:var(--gray2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-r{text-align:right;flex-shrink:0}
.pi-amt{font-size:13px;font-weight:800;color:var(--blue2)}
.bdg{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:700}
.bdg.paid{background:var(--green2);color:var(--green)}.bdg.partial{background:var(--amber2);color:var(--amber)}.bdg.pending{background:var(--red2);color:var(--red)}
.pb{background:rgba(255,255,255,.08);border-radius:99px;height:5px}
.pf{height:100%;border-radius:99px;background:var(--blue)}
.pf.done{background:var(--green)}.pf.mid{background:var(--amber)}
.sw{padding:12px 16px 4px;position:relative}
.sw input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r2);padding:12px 14px 12px 40px;color:var(--white);font-size:16px;outline:none;font-family:var(--font);-webkit-appearance:none}
.sw input::placeholder{color:var(--gray)}
.sw input:focus{border-color:var(--blue)}
.si{position:absolute;left:29px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none}
.chips{display:flex;gap:8px;padding:8px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);color:var(--gray2);background:none;white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0}
.chip.on{background:var(--blue3);border-color:var(--blue);color:var(--blue2)}
.fab{position:fixed;bottom:calc(72px + var(--safe-b) + 14px);right:20px;width:56px;height:56px;background:var(--blue);border-radius:50%;border:none;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(59,130,246,.5);cursor:pointer;z-index:40}
.fab:active{transform:scale(.92)}
.empty{text-align:center;padding:56px 28px;color:var(--gray)}
.empty span{font-size:44px;display:block;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* ── FORM — inputs never trigger re-render ── */
.fw{padding:0 16px}
.sl{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue2);font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--border2)}
.f{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.f label{font-size:12px;color:var(--gray2);font-weight:600}
.f input,.f select{background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r2);padding:13px 14px;color:var(--white);font-size:16px;outline:none;font-family:var(--font);width:100%;-webkit-appearance:none}
.f input:focus,.f select:focus{border-color:var(--blue)}
.f input::placeholder{color:var(--gray)}
.f select option{background:var(--bg2)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Computed readonly fields */
.ro-blue{background:rgba(59,130,246,.08)!important;border-color:rgba(59,130,246,.3)!important;color:var(--blue2)!important;font-weight:700!important}
.ro-green{background:rgba(34,197,94,.08)!important;border-color:rgba(34,197,94,.3)!important;color:var(--green)!important;font-weight:700!important}
.ro-amber{background:rgba(245,158,11,.08)!important;border-color:rgba(245,158,11,.3)!important;color:var(--amber)!important;font-weight:700!important}
.ro-red{background:rgba(239,68,68,.08)!important;border-color:rgba(239,68,68,.3)!important;color:var(--red)!important;font-weight:700!important}
/* Formula table */
.ftbl{width:100%;border:1.5px solid var(--border2);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.fr2{display:grid;grid-template-columns:46px 1fr 1fr 1fr 1fr;border-bottom:1px solid var(--border)}
.fr2:last-child{border-bottom:none}
.fc{padding:9px 4px;text-align:center;font-size:12px}
.fc.hd{background:rgba(0,0,0,.25);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray2);font-weight:700}
.fc.ey{font-weight:800;color:var(--blue2);font-size:11px;background:rgba(59,130,246,.08);display:flex;align-items:center;justify-content:center}
.fc input{width:100%;background:transparent;border:none;outline:none;color:var(--white);font-size:14px;text-align:center;font-family:var(--font);padding:0}
.fc input::placeholder{color:var(--gray);font-size:12px}
/* Saldo summary box */
.sb{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);display:grid;grid-template-columns:1fr 1fr 1fr;margin-bottom:10px}
.sbi{padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.sbi:last-child{border-right:none}
.sbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray2);font-weight:700}
.sbv{font-size:15px;font-weight:800;margin-top:4px;word-break:break-word}
.save-btn{width:100%;padding:16px;background:var(--blue);color:white;border:none;border-radius:var(--r2);font-size:16px;font-weight:800;font-family:var(--font);cursor:pointer;margin-top:8px;letter-spacing:-.2px}
.save-btn:active{background:#2563eb}
/* Sheet */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:flex;align-items:flex-end}
.sh{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b)}
.sh-hnd{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:10px auto 0}
.sh-head{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sh-head h2{font-size:17px;font-weight:800}
.sh-scr{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 20px;flex:1}
.dr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.dr:last-child{border-bottom:none}
.dr-l{font-size:12px;color:var(--gray2);font-weight:500}
.dr-v{font-size:13px;font-weight:700;text-align:right;max-width:60%}
.sh-foot{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border)}
.sh-foot button{flex:1;padding:13px;border-radius:var(--r2);border:none;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer}
.ab-form{background:var(--bg3);border:1px solid rgba(34,197,94,.2);border-radius:var(--r2);padding:14px;margin:12px 0}
.ab-ttl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--green);font-weight:700;margin-bottom:10px}
.ab-list{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.ab-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:8px;padding:9px 12px}
.ab-amt{font-size:14px;font-weight:800;color:var(--green)}
.ab-dt{font-size:11px;color:var(--gray2)}
.ab-del{background:none;border:none;color:var(--gray);font-size:18px;cursor:pointer;padding:2px 6px}
.cb{background:var(--blue3);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cb-l{font-size:10px;color:var(--blue2);font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.cb-v{font-size:20px;font-weight:800}
.sl2{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue2);font-weight:700;margin:14px 0 8px}
.toast{position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--blue);border-radius:12px;padding:11px 20px;font-size:13.5px;font-weight:600;z-index:200;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:tin .25s ease}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.back-btn{background:none;border:none;color:var(--blue2);font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;padding:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
const KEY='hr_jornadas_v2';
const fmt=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);
const tod=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9);
const ef=()=>({esfera:'',cilindro:'',eje:'',adicion:''});
const load=()=>{try{const d=localStorage.getItem(KEY);return d?JSON.parse(d):[]}catch{return[]}};
const save=d=>{try{localStorage.setItem(KEY,JSON.stringify(d))}catch{}};
const esc=v=>String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

const tvp=p=>(parseFloat(p.valorLente)||0)+(parseFloat(p.valorMontura)||0);
const tap=p=>(p.abonos||[]).reduce((s,a)=>s+a.monto,0);
const tsp=p=>tvp(p)-tap(p);
const estp=p=>{const v=tvp(p),a=tap(p);if(v===0)return'pending';if(a>=v)return'paid';if(a>0)return'partial';return'pending';};
const elbl=e=>e==='paid'?'Pagado':e==='partial'?'Parcial':'Pendiente';
const emptyRec=()=>({id:uid(),control:'',nombre:'',fecha:tod(),cedula:'',correo:'',nit:'',empresa:'',edad:'',telefono:'',direccion:'',ciudad:'',od:ef(),oi:ef(),laboratorio:'',ordenLab:'',tipoLente:'',valorLente:'',montura:'',valorMontura:'',abonoInicial:'',abonos:[]});

// ── State ─────────────────────────────────────────────────────────────────────
let S={view:'home',records:load(),search:'',filter:'all',form:emptyRec(),detail:null,toast:null,abAmt:'',abFecha:tod()};
const app=document.getElementById('app');
let tTimer=null;

function showToast(msg){S.toast=msg;const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);clearTimeout(tTimer);tTimer=setTimeout(()=>t.remove(),2400);}

// ── CRITICAL: Field update WITHOUT re-render ──────────────────────────────────
// Plain text / date / tel fields — just store, no redraw
function sf(k,v){ S.form[k]=v; }
// Formula fields
function sfx(eye,k,v){ S.form[eye][k]=v; }

// Numeric fields that affect computed values — store + update computed DOM only
function sfn(k,v){
  S.form[k]=v;
  updateComputed();
}

function updateComputed(){
  const f=S.form;
  const tot=(parseFloat(f.valorLente)||0)+(parseFloat(f.valorMontura)||0);
  const ai=parseFloat(f.abonoInicial)||0;
  const sd=Math.max(0,tot-ai);
  const pct=tot>0?Math.min(100,(ai/tot)*100):0;

  // Total venta
  const elTot=document.getElementById('c-total');
  if(elTot) elTot.value=fmt(tot);

  // Saldo
  const elSd=document.getElementById('c-saldo');
  if(elSd){
    elSd.value=tot>0?fmt(sd):'—';
    elSd.className='';
    if(tot>0){
      if(sd===0) elSd.className='ro-green';
      else if(ai>0) elSd.className='ro-amber';
      else elSd.className='ro-red';
    }
  }

  // Summary box
  const elSbTot=document.getElementById('sb-tot');
  const elSbAb=document.getElementById('sb-ab');
  const elSbSd=document.getElementById('sb-sd');
  const elSbox=document.getElementById('saldo-box');
  if(elSbox){
    if(tot>0){
      elSbox.style.display='grid';
      if(elSbTot) elSbTot.textContent=fmt(tot);
      if(elSbAb)  elSbAb.textContent=fmt(ai);
      if(elSbSd){
        elSbSd.textContent=fmt(sd);
        elSbSd.style.color=sd===0?'var(--green)':ai>0?'var(--amber)':'var(--red)';
      }
    } else {
      elSbox.style.display='none';
    }
  }

  // Progress bar
  const elPf=document.getElementById('pf-form');
  const elPl=document.getElementById('pl-form');
  const elPw=document.getElementById('pw-form');
  if(elPw) elPw.style.display=tot>0?'block':'none';
  if(elPf){
    elPf.style.width=pct+'%';
    elPf.className='pf'+(pct>=100?' done':pct>0?' mid':'');
  }
  if(elPl) elPl.textContent=pct.toFixed(0)+'% pagado al registrar';
}

// ── Navigation (full re-render only on view change) ───────────────────────────
function go(partial){
  // Flush current form input values before navigating away
  if(S.view==='new'||S.view==='edit') flushForm();
  Object.assign(S,partial);
  render();
}

// Read all live input values from DOM into S.form before save / navigate
function flushForm(){
  const ids=['control','nombre','fecha','cedula','correo','nit','empresa','edad','telefono','direccion','ciudad','laboratorio','ordenLab','tipoLente','valorLente','montura','valorMontura','abonoInicial'];
  ids.forEach(k=>{const el=document.getElementById('fi-'+k);if(el)S.form[k]=el.value;});
  // Formula
  ['od','oi'].forEach(eye=>{
    ['esfera','cilindro','eje','adicion'].forEach(k=>{
      const el=document.getElementById('fi-'+eye+'-'+k);
      if(el)S.form[eye][k]=el.value;
    });
  });
}

function doSave(){
  flushForm();
  if(!S.form.nombre.trim()){showToast('⚠️ El nombre es requerido');return;}
  const ai=parseFloat(S.form.abonoInicial)||0;
  let rec={...S.form,abonoInicial:undefined};
  if(S.view==='new'&&ai>0) rec={...rec,abonos:[{id:uid(),monto:ai,fecha:rec.fecha}]};
  else if(S.view==='new') rec={...rec,abonos:[]};
  if(S.view==='new'){S.records=[{...rec,id:uid()},...S.records];}
  else{S.records=S.records.map(r=>r.id===rec.id?rec:r);S.detail=rec;}
  save(S.records);
  showToast(S.view==='new'?'✅ Paciente guardado':'✅ Actualizado');
  S.view='list'; render();
}

function doDel(id){
  if(!confirm('¿Eliminar este registro?'))return;
  S.records=S.records.filter(r=>r.id!==id);
  save(S.records);showToast('🗑️ Eliminado');S.detail=null;render();
}

function doAbono(){
  const m=parseFloat(document.getElementById('ab-amt-i').value||S.abAmt);
  const fecha=document.getElementById('ab-fecha-i').value||S.abFecha;
  if(!m||m<=0){showToast('⚠️ Valor inválido');return;}
  const p=S.detail;
  const upd={...p,abonos:[...(p.abonos||[]),{id:uid(),monto:m,fecha}]};
  S.records=S.records.map(r=>r.id===p.id?upd:r);
  save(S.records);S.detail=upd;S.abAmt='';S.abFecha=tod();
  showToast('✅ Abono registrado');render();
}

function delAbono(pid,aid){
  const p=S.records.find(r=>r.id===pid);
  const upd={...p,abonos:p.abonos.filter(a=>a.id!==aid)};
  S.records=S.records.map(r=>r.id===pid?upd:r);
  save(S.records);S.detail=upd;render();
}

function openDetail(id){const p=S.records.find(r=>r.id===id);if(p){S.detail=p;S.abAmt='';S.abFecha=tod();render();}}
function openNew(){S.form=emptyRec();S.detail=null;S.view='new';render();}
function openEdit(id){const p=S.records.find(r=>r.id===id);if(p){S.form={...p,abonos:[...p.abonos],abonoInicial:''};S.detail=null;S.view='edit';render();}}

// ── Views ─────────────────────────────────────────────────────────────────────
function vHome(){
  const recs=S.records;
  const tot=recs.reduce((s,r)=>s+tvp(r),0);
  const cob=recs.reduce((s,r)=>s+tap(r),0);
  const pen=recs.reduce((s,r)=>s+Math.max(0,tsp(r)),0);
  const rec5=[...recs].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,5);
  const pen5=recs.filter(r=>tsp(r)>0).sort((a,b)=>tsp(b)-tsp(a)).slice(0,4);
  return`
<div class="screen">
<div class="topbar"><div><div class="topbar-title">👁️ HR Visión</div><div class="topbar-sub">Jornadas ópticas en campo</div></div><div class="topbar-badge">${recs.length} pacientes</div></div>
<div class="scroll">
<div class="stat-grid">
  <div class="stat-pill sp-b"><div class="sp-l">Total ventas</div><div class="sp-v" style="color:var(--blue2)">${fmt(tot)}</div><div class="sp-s">facturado</div></div>
  <div class="stat-pill sp-g"><div class="sp-l">Cobrado</div><div class="sp-v" style="color:var(--green)">${fmt(cob)}</div><div class="sp-s">recibido</div></div>
  <div class="stat-pill sp-r"><div class="sp-l">Por cobrar</div><div class="sp-v" style="color:var(--red)">${fmt(pen)}</div><div class="sp-s">pendiente</div></div>
  <div class="stat-pill sp-a"><div class="sp-l">Pacientes</div><div class="sp-v" style="color:var(--amber)">${recs.length}</div><div class="sp-s">registrados</div></div>
</div>
${rec5.length?`<div class="card"><div class="ch"><span class="ch-t">🕐 Recientes</span><button class="ch-a" onclick="go({view:'list'})">Ver todos →</button></div>${rec5.map(r=>`

function renderPatientRows(recs){
  if(!recs.length) return`<div class="empty"><span>🔍</span><p>Sin resultados.<br>Prueba otro término o agrega un paciente.</p></div>`;
  return recs.map(r=>`<div class="pi" onclick="openDetail('${r.id}')"><div class="av">${r.nombre.charAt(0).toUpperCase()}</div><div class="pi-info"><div class="pi-n">${r.nombre}</div><div class="pi-s">${r.empresa||'—'} · Ctrl ${r.control||'—'} · ${r.ciudad||'—'}</div></div><div class="pi-r"><div class="pi-amt">${fmt(tvp(r))}</div><span class="bdg ${estp(r)}">${elbl(estp(r))}</span></div></div>`).join('');
}

// Search without full re-render
function filterList(){
  const q=S.search.toLowerCase();
  const recs=S.records.filter(r=>{
    const m=!q||r.nombre.toLowerCase().includes(q)||r.cedula.includes(q)||(r.empresa||'').toLowerCase().includes(q)||r.control.includes(q)||(r.ciudad||'').toLowerCase().includes(q);
    return m&&(S.filter==='all'||estp(r)===S.filter);
  }).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const el=document.getElementById('patient-list');
  if(el) el.innerHTML=renderPatientRows(recs);
}

function setFilter(v){
  S.filter=v;
  // Update chip styles without full re-render
  document.querySelectorAll('.chip').forEach(c=>{
    c.classList.toggle('on',c.textContent===({all:'Todos',pending:'Pendiente',partial:'Parcial',paid:'Pagado'}[v]));
  });
  filterList();
}

<script>
function doExport(){
  if(!window.XLSX){showToast('⚠️ Espera un momento e intenta de nuevo');return;}
  const rows=S.records.map(p=>({
    'Control':p.control,'Fecha':p.fecha,'Nombre':p.nombre,'Cédula':p.cedula,
    'Correo':p.correo,'Edad':p.edad,'Teléfono':p.telefono,'Dirección':p.direccion,
    'Ciudad':p.ciudad,'NIT Empresa':p.nit,'Empresa':p.empresa,
    'OD Esfera':p.od.esfera,'OD Cilindro':p.od.cilindro,'OD Eje':p.od.eje,'OD Adición':p.od.adicion,
    'OI Esfera':p.oi.esfera,'OI Cilindro':p.oi.cilindro,'OI Eje':p.oi.eje,'OI Adición':p.oi.adicion,
    'Laboratorio':p.laboratorio,'N° Orden Lab.':p.ordenLab,
    'Tipo Lente':p.tipoLente,'Valor Lente':parseFloat(p.valorLente)||0,
    'Montura':p.montura,'Valor Montura':parseFloat(p.valorMontura)||0,
    'Total Venta':tvp(p),'Total Abonado':tap(p),'Saldo Pendiente':Math.max(0,tsp(p)),
    'Estado':elbl(estp(p)),
    'Abonos':p.abonos.map(a=>a.fecha+': $'+a.monto).join(' | '),
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=Object.keys(rows[0]||{}).map(()=>({wch:18}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Jornadas');
  XLSX.writeFile(wb,'HR_Vision_Jornadas_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showToast('✅ Excel descargado');
}

function doImport(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        const imp=rows.map(r=>({
          id:uid(),control:String(r['Control']||''),nombre:r['Nombre']||'',fecha:r['Fecha']||tod(),
          cedula:String(r['Cédula']||''),correo:r['Correo']||'',nit:String(r['NIT Empresa']||''),
          empresa:r['Empresa']||'',edad:String(r['Edad']||''),telefono:String(r['Teléfono']||''),
          direccion:r['Dirección']||'',ciudad:r['Ciudad']||'',
          od:{esfera:String(r['OD Esfera']||''),cilindro:String(r['OD Cilindro']||''),eje:String(r['OD Eje']||''),adicion:String(r['OD Adición']||'')},
          oi:{esfera:String(r['OI Esfera']||''),cilindro:String(r['OI Cilindro']||''),eje:String(r['OI Eje']||''),adicion:String(r['OI Adición']||'')},
          laboratorio:r['Laboratorio']||'',ordenLab:String(r['N° Orden Lab.']||''),
          tipoLente:r['Tipo Lente']||'',valorLente:r['Valor Lente']||'',
          montura:r['Montura']||'',valorMontura:r['Valor Montura']||'',
          abonoInicial:'',
          abonos:r['Abonos']?String(r['Abonos']).split('|').filter(Boolean).map(s=>{
            const[fecha,resto]=(s.trim()).split(':');
            return{id:uid(),fecha:(fecha||'').trim(),monto:parseFloat((resto||'').replace(/[^0-9.]/g,''))||0};
          }):[],
        }));
        if(confirm('¿Importar '+imp.length+' registros? Se añadirán a los actuales.')){
          S.records=[...S.records,...imp];
          save(S.records);
          showToast('✅ '+imp.length+' registros importados');
          render();
        }
      }catch(err){showToast('❌ Error al leer el archivo');}
    };
    reader.readAsBinaryString(file);
  };
  inp.click();
}
</script>
</body>
</html>
